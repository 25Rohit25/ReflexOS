version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reflexos-postgres
    environment:
      POSTGRES_USER: reflexos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reflexos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: reflexos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: reflexos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Note: Ollama requires proper hardware acceleration for good performance.
  # If running locally on Windows/Mac, it's often better to run Ollama natively
  # rather than in Docker, but we include it here for completeness.
  ollama:
    image: ollama/ollama:latest
    container_name: reflexos-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
